<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<title>ሰነዶች መጫን</title>
<link rel="stylesheet" href="../css/styles.css">
</head>

<body>

<a href="../dashboards/officer-dashboard.html">← ተመለስ</a>

<h2>ሰነዶች መጫን</h2>

<div id="messageBox"></div>

<!-- Wrap everything in a form -->
<form id="uploadForm">
  <label>የማመልከቻ መለያ</label>
  <input type="number" id="appId" required>

  <h3>የጎደሉ ሰነዶችን መጫን</h3>

  <label>ፊርማ ፎቶ</label>
  <input type="file" id="signature">

  <label>ፋይዳ መለያ ቅጂ</label>
  <input type="file" id="fayida_doc">

  <label>ቀበሌ መለያ ቅጂ</label>
  <input type="file" id="kebele_doc">

  <br><br>
  <button type="submit" id="uploadBtn">ጫን</button>
</form>

<script type="module" src="../js/upload-documents.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<title>ቅንብር</title>
<link rel="stylesheet" href="./css/styles.css">
</head>

<body>
<a href="./dashboards/admin-dashboard.html">← ተመለስ</a>

  <h2>⚙️ ስርዓት ቅንብር</h2>

<div class="container">

<main class="content">

<div class="cards">

<!-- System Name -->
<div class="card">
  <h4>የስርዓት ስም</h4>
  <input type="text" id="systemName" value="LPQVS">
</div>

<!-- Phase -->
<div class="card">
  <h4>የስርዓት ደረጃ</h4>
  <input type="text" id="systemPhase" value="Phase I">
</div>

<!-- Role -->
<div class="card">
  <h4>ሚና:</h4>
  <p>አስተዳዳሪ</p><br>
</div>

<!-- Backend Status -->
<div class="card">
  <h4>የጀርባ ሁኔታ</h4>
  <p id="backendStatus">Checking...</p>
</div>

</div>

<br>

<button onclick="saveSettings()">💾 አስቀምጥ</button>

<p id="message" style="margin-top:10px;"></p>

</main>

</div>

<script>

// ================= CHECK BACKEND =================
async function checkBackend() {
  try {
    const res = await fetch("http://localhost:5000/api/dashboard-stats", {
      credentials: "include"
    });

    document.getElementById("backendStatus").innerText =
      res.ok ? "🟢 ተገናኝቷል" : "🔴 ስህተት";

  } catch (err) {
    document.getElementById("backendStatus").innerText = "🔴 Offline";
  }
}

// ================= SAVE SETTINGS =================
function saveSettings() {

  const name = document.getElementById("systemName").value;
  const phase = document.getElementById("systemPhase").value;

  // 🔥 SAVE BOTH
  localStorage.setItem("systemName", name);
  localStorage.setItem("systemPhase", phase);

  document.getElementById("message").innerText =
    " ቅንብር ተቀምጧል";
}

// ================= LOAD SETTINGS =================
function loadSettings() {

  const name = localStorage.getItem("systemName");
  const phase = localStorage.getItem("systemPhase");

  if (name) {
    document.getElementById("systemName").value = name;
  }

  if (phase) {
    document.getElementById("systemPhase").value = phase;
  }
}

// ================= LOGOUT =================
async function logout() {
  await fetch("http://localhost:5000/api/logout", {
    method: "POST",
    credentials: "include"
  });

  window.location.href = "../login.html";
}

// INIT
checkBackend();
loadSettings();

</script>

</body>
</html>

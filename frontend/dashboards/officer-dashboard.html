<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<title>የመሬት ምርመራ ስርዓት - ኦፊሰር ዳሽቦርድ</title>
<link rel="stylesheet" href="dashboard.css">
</head>

<body>

<header>
<h2>LPQVS - ኦፊሰር ዳሽቦርድ</h2>
<button onclick="logout()">ውጣ</button>
</header>

<div class="container">

<aside class="sidebar">
<ul>

<li>
<a href="../applications/new-application.html">
📄 አዲስ ማመልከቻ
</a>
</li>

<li>
<a href="../applications/submitted-application.html">
📂 የኔ ማመልከቻዎች
</a>
</li>

<li>
<a href="../applications/upload-documents.html">
📤 ሰነዶች መጫን
</a>
</li>
</ul>
</aside>

<main class="content">

<h3>የዛሬ ስራ</h3>

<div class="cards">

<div class="card">
<h4>የሚጠባበቁ ማመልከቻዎች</h4>
<p id="pending">0</p>
</div>

<div class="card">
<h4>ዛሬ የተሰሩ</h4>
<p id="today">0</p>
</div>

<div class="card">
<h4>የወር አፈፃፀም</h4>
<p id="total">0</p>
</div>

</div>

</main>

</div>

<script>
function logout(){
window.location.href="../login.html";
}
async function loadOfficerDashboard() {
  try {
    const res = await fetch("http://localhost:5000/api/reports/summary");
    const data = await res.json();

    document.getElementById("pending").innerText = data.pending || 0;
    document.getElementById("total").innerText = data.total || 0;

    const todayRes = await fetch("http://localhost:5000/api/dashboard-stats");
    const todayData = await todayRes.json();

    document.getElementById("today").innerText = todayData.todayEntries || 0;

  } catch (err) {
    console.error(err);
  }
}

loadOfficerDashboard();

</script>

</body>
</html>
